<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Video - Anomaly Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .processing-container {
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .progress-container {
            max-width: 500px;
            width: 100%;
        }
        .status-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="processing-container">
            <div class="text-center progress-container">
                <div class="card shadow-lg">
                    <div class="card-body p-5">
                        <div id="processingIcon" class="status-icon text-primary pulse">
                            <i class="bi bi-gear-fill"></i>
                        </div>
                        
                        <h3 id="statusTitle">Processing Video</h3>
                        <p id="statusMessage" class="text-muted mb-4">Analyzing video for fire, violence, and explosions...</p>
                        
                        <div class="progress mb-3" style="height: 20px;">
                            <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-primary" 
                                 role="progressbar" style="width: 0%"></div>
                        </div>
                        
                        <div class="row text-center">
                            <div class="col">
                                <small class="text-muted">Progress: <span id="progressText">0%</span></small>
                            </div>
                        </div>
                        
                        <div id="errorContainer" class="alert alert-danger mt-3" style="display: none;">
                            <i class="bi bi-exclamation-triangle"></i>
                            <strong>Error:</strong> <span id="errorMessage"></span>
                        </div>
                        
                        <div id="completedContainer" style="display: none;">
                            <div class="alert alert-success mt-3">
                                <i class="bi bi-check-circle"></i>
                                <strong>Processing Complete!</strong>
                            </div>
                            <a href="/results" class="btn btn-success btn-lg">
                                <i class="bi bi-bar-chart"></i> View Results
                            </a>
                        </div>
                        
                        <div class="mt-4">
                            <a href="/" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> Back to Upload
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function updateStatus() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    const progressBar = document.getElementById('progressBar');
                    const progressText = document.getElementById('progressText');
                    const statusTitle = document.getElementById('statusTitle');
                    const statusMessage = document.getElementById('statusMessage');
                    const processingIcon = document.getElementById('processingIcon');
                    const errorContainer = document.getElementById('errorContainer');
                    const errorMessage = document.getElementById('errorMessage');
                    const completedContainer = document.getElementById('completedContainer');
                    
                    // Update progress
                    const progress = Math.round(data.progress);
                    progressBar.style.width = progress + '%';
                    progressText.textContent = progress + '%';
                    
                    if (data.error) {
                        // Show error
                        statusTitle.textContent = 'Processing Failed';
                        statusMessage.textContent = 'An error occurred during video processing.';
                        processingIcon.innerHTML = '<i class="bi bi-exclamation-triangle text-danger"></i>';
                        processingIcon.classList.remove('pulse');
                        errorContainer.style.display = 'block';
                        errorMessage.textContent = data.error;
                        progressBar.classList.remove('progress-bar-animated');
                        progressBar.classList.add('bg-danger');
                        
                    } else if (data.results && progress >= 100) {
                        // Processing complete
                        statusTitle.textContent = 'Analysis Complete!';
                        statusMessage.textContent = 'Video has been successfully analyzed for anomalies.';
                        processingIcon.innerHTML = '<i class="bi bi-check-circle text-success"></i>';
                        processingIcon.classList.remove('pulse');
                        completedContainer.style.display = 'block';
                        progressBar.classList.remove('progress-bar-animated');
                        progressBar.classList.add('bg-success');
                        
                        // Stop polling
                        clearInterval(statusInterval);
                        
                    } else if (data.is_processing) {
                        // Still processing
                        if (progress < 25) {
                            statusMessage.textContent = 'Loading video and initializing AI model...';
                        } else if (progress < 50) {
                            statusMessage.textContent = 'Analyzing frames for anomalies...';
                        } else if (progress < 75) {
                            statusMessage.textContent = 'Detecting fire, violence, and explosions...';
                        } else if (progress < 95) {
                            statusMessage.textContent = 'Generating heatmap and results...';
                        } else {
                            statusMessage.textContent = 'Finalizing analysis...';
                        }
                    }
                })
                .catch(error => {
                    console.error('Error fetching status:', error);
                });
        }
        
        // Poll for status updates every 2 seconds
        const statusInterval = setInterval(updateStatus, 2000);
        
        // Initial status check
        updateStatus();
    </script>
</body>
</html>
