{% extends 'admin/base.html' %}

{% block title %}Admin Map | Raahi{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-map-marked-alt me-2"></i> Admin Safety Map</h5>
                </div>
                <div class="card-body p-0">
                    <div id="adminMap" style="height: 70vh;"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/map.js') }}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const adminMap = new SafetyMap('adminMap', {
            enableUserLocation: false,
            autoLoadData: true,
            defaultLat: {{ default_lat }},
            defaultLng: {{ default_lng }},
            defaultZoom: {{ default_zoom }}
        });
        
        adminMap.initialize();
    });
</script>
{% endblock %}
