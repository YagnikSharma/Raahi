{% extends 'base.html' %}

{% block title %}Admin Control Login | Raahi{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="login-container">
        <!-- Floating Shield Logo -->
        <div class="login-logo">
            <i class="fas fa-shield-halved"></i>
        </div>
        
        <h3 class="text-center text-white fw-bold mb-1">RAAHI</h3>
        <p class="text-center text-muted small mb-4">Command Center Authentication</p>
        
        <form method="POST" action="{{ url_for('auth.login') }}">
            <!-- Email Address input -->
            <div class="mb-3">
                <label for="email" class="form-label small text-muted">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control border-start-0" id="email" name="email" placeholder="name@raahi.com" required autofocus>
                </div>
            </div>
            
            <!-- Password input -->
            <div class="mb-3">
                <label for="password" class="form-label small text-muted">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control border-start-0" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>
            
            <!-- Remember me checkbox -->
            <div class="mb-4 d-flex justify-content-between align-items-center">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                    <label class="form-check-label text-muted small" for="remember">Keep me logged in</label>
                </div>
                <a href="{{ url_for('auth.forgot_password') }}" class="small text-primary text-decoration-none">Forgot password?</a>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2.5 mb-3 fw-bold">
                <i class="fas fa-sign-in-alt me-2"></i> Authenticate
            </button>
        </form>
        
        <hr class="my-4 border-secondary-subtle">
        
        <div class="text-center">
            <p class="small text-muted mb-3">Authorized personnel only. Activities are monitored.</p>
            <div class="d-flex justify-content-center gap-2">
                <a href="{{ url_for('auth.register') }}" class="btn btn-sm btn-outline-secondary px-3 rounded-pill">
                    <i class="fas fa-user-plus me-1"></i> Request Access
                </a>
                <a href="{{ url_for('public.index') }}" class="btn btn-sm btn-outline-secondary px-3 rounded-pill">
                    <i class="fas fa-arrow-left me-1"></i> Public Portal
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
